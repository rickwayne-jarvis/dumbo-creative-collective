<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCC — DUMBO Creative Collective</title>
<meta name="description" content="The private creative community at 55 Washington Street, Brooklyn. Members directory.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF7F2;
  --surface:#F5F0E8;
  --card:#FFFFFF;
  --green:#2D4A3E;
  --ink:#1A1A1A;
  --body:#3D3D3D;
  --muted:#8A8277;
  --border:#E8E2D8;
  --serif:'Cormorant Garamond','Playfair Display',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:var(--green);text-decoration:none;transition:opacity 0.2s}
a:hover{opacity:0.7}
::selection{background:rgba(45,74,62,0.15);color:var(--ink)}

/* ── SPLASH ──────────────────────────────────────────────────── */
#splash{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9000;transition:opacity 0.65s ease;
}
.splash-bridge{
  position:absolute;bottom:0;left:0;right:0;height:180px;
  pointer-events:none;opacity:0.05;color:var(--ink);
}
.splash-bridge svg{width:100%;height:100%}
.splash-content{text-align:center;position:relative;z-index:1;padding:0 32px}
.splash-monogram{
  font-family:var(--serif);
  font-size:clamp(88px,14vw,160px);
  font-weight:400;color:var(--ink);
  letter-spacing:-3px;line-height:0.9;
  margin-bottom:28px;
}
.splash-name{
  font-family:var(--sans);font-size:10px;font-weight:400;
  letter-spacing:5px;text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;
}
.splash-sub{
  font-family:var(--serif);font-size:16px;font-style:italic;
  color:var(--muted);font-weight:400;margin-bottom:52px;
}
.splash-cta{
  display:inline-block;padding:15px 48px;
  border:1px solid rgba(26,26,26,0.22);border-radius:50px;
  font-family:var(--sans);font-size:10px;font-weight:500;
  letter-spacing:3px;text-transform:uppercase;color:var(--ink);
  background:transparent;cursor:pointer;transition:all 0.3s ease;
}
.splash-cta:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.splash-address{
  position:absolute;bottom:28px;
  font-family:var(--sans);font-size:9px;
  letter-spacing:2.5px;text-transform:uppercase;color:rgba(26,26,26,0.28);
}

/* ── APP ─────────────────────────────────────────────────────── */
#app{opacity:0;transition:opacity 0.5s ease;min-height:100vh;display:none}
#app.visible{opacity:1}

/* ── TOPBAR ──────────────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1200px;margin:0 auto;padding:0 40px;
  height:58px;display:flex;align-items:center;justify-content:space-between;
}
.topbar-brand{
  font-family:var(--serif);font-size:17px;font-weight:500;
  letter-spacing:0.5px;color:var(--ink);
}
.search-wrap input{
  border:none;border-bottom:1px solid var(--border);
  background:transparent;font-family:var(--sans);font-size:13px;
  font-weight:300;color:var(--ink);padding:5px 0;
  width:190px;outline:none;transition:border-color 0.25s;
}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap input::placeholder{color:var(--muted);font-style:italic}

/* ── CATEGORY NAV ────────────────────────────────────────────── */
.cat-nav-wrap{
  background:var(--bg);border-bottom:1px solid var(--border);
  position:sticky;top:58px;z-index:190;
}
.cat-nav{
  max-width:1200px;margin:0 auto;padding:0 32px;
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
}
.cat-nav::-webkit-scrollbar{display:none}
.cat-link{
  padding:15px 18px;font-family:var(--sans);font-size:11px;
  font-weight:400;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);background:transparent;border:none;
  border-bottom:2px solid transparent;cursor:pointer;
  white-space:nowrap;transition:color 0.2s,border-color 0.2s;
  margin-bottom:-1px;
}
.cat-link:hover{color:var(--ink)}
.cat-link.active{color:var(--ink);border-bottom-color:var(--ink)}

/* ── GRID ────────────────────────────────────────────────────── */
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 40px 100px}
.count-line{
  font-family:var(--sans);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
  padding:24px 0 20px;text-align:right;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
  .topbar-inner{padding:0 24px}
  .cat-nav{padding:0 16px}
  .grid-wrap{padding:0 24px 80px}
  .splash-monogram{letter-spacing:-1px}
}

/* ── CARD ────────────────────────────────────────────────────── */
.card{
  background:var(--card);padding:40px;cursor:pointer;
  border:1px solid var(--border);margin:-1px 0 0 -1px;
  display:flex;flex-direction:column;position:relative;
  transition:box-shadow 0.3s,z-index 0s;
  animation:cardIn 0.4s ease both;
}
.card:hover{box-shadow:0 6px 28px rgba(0,0,0,0.08);z-index:1}
.card-name{
  font-family:var(--serif);font-size:22px;font-weight:500;
  color:var(--ink);line-height:1.2;margin-bottom:6px;letter-spacing:0.1px;
  transition:color 0.2s;
}
.card:hover .card-name{color:var(--green)}
.card-discipline{
  font-family:var(--serif);font-size:13.5px;font-style:italic;
  color:var(--muted);margin-bottom:16px;
}
.card-desc{
  font-family:var(--sans);font-size:13px;font-weight:300;
  color:var(--body);line-height:1.75;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;flex:1;margin-bottom:22px;
}
.card-view{
  font-family:var(--sans);font-size:10px;font-weight:400;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);transition:color 0.2s;align-self:flex-end;
}
.card:hover .card-view{color:var(--green)}

/* ── NO RESULTS ──────────────────────────────────────────────── */
.no-results{
  text-align:center;padding:100px 40px;color:var(--muted);
  font-family:var(--sans);font-size:13px;
}
.no-results span{
  display:block;font-family:var(--serif);font-size:22px;
  font-style:italic;color:var(--body);margin-bottom:10px;
}

/* ── MODAL ───────────────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,26,26,0.38);z-index:1000;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s ease;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-panel{
  width:100%;max-width:720px;max-height:92vh;background:#FFFFFF;
  border-radius:12px 12px 0 0;
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(40px);opacity:0;
  transition:transform 0.42s cubic-bezier(0.16,1,0.3,1),opacity 0.3s ease;
}
.modal-overlay.open .modal-panel{transform:translateY(0);opacity:1}
@media(min-width:740px){
  .modal-overlay{align-items:center;padding:40px 20px}
  .modal-panel{
    border-radius:8px;max-height:88vh;
    transform:translateY(16px) scale(0.99);
  }
  .modal-overlay.open .modal-panel{transform:translateY(0) scale(1)}
}
.modal-scroll{
  overflow-y:auto;flex:1;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.modal-scroll::-webkit-scrollbar{width:4px}
.modal-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.modal-header{
  padding:36px 40px 28px;border-bottom:1px solid var(--border);position:relative;
}
.modal-close{
  position:absolute;top:22px;right:22px;width:32px;height:32px;
  border-radius:50%;border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;transition:all 0.2s;
}
.modal-close:hover{border-color:var(--ink);color:var(--ink)}
.modal-logo-row{display:flex;align-items:flex-start;gap:22px;margin-bottom:0}
.modal-logo-wrap{
  width:80px;height:80px;border-radius:8px;overflow:hidden;
  background:var(--surface);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;border:1px solid var(--border);
}
.modal-logo-wrap img.co-logo{width:80px;height:80px;object-fit:contain;padding:8px;display:block}
.modal-name-block{flex:1;padding-top:4px;min-width:0}
.modal-name{
  font-family:var(--serif);font-size:clamp(20px,3vw,28px);
  font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:6px;
}
.modal-discipline{
  font-family:var(--serif);font-size:14px;font-style:italic;
  color:var(--muted);margin-bottom:10px;
}
.modal-residence{
  font-family:var(--sans);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);
}
.modal-body{padding:32px 40px}
.modal-section{margin-bottom:28px}
.modal-section:last-child{margin-bottom:0}
.section-label{
  font-family:var(--sans);font-size:9px;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;color:var(--muted);
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);
}
.modal-desc{
  font-family:var(--sans);font-size:14px;font-weight:300;
  color:var(--body);line-height:1.82;
}
.contact-grid{display:grid;gap:8px}
.contact-row{
  display:flex;align-items:center;gap:10px;
  font-family:var(--sans);font-size:13px;font-weight:300;color:var(--body);
}
.contact-icon{width:14px;text-align:center;color:var(--muted);font-size:11px;flex-shrink:0}
.contact-row a{color:var(--green)}
.person-list{display:grid;gap:8px}
.person-card{
  padding:14px 16px;border-left:2px solid var(--border);margin-left:4px;
}
.person-name{
  font-family:var(--serif);font-size:14px;font-weight:500;
  color:var(--ink);margin-bottom:2px;
}
.person-title{
  font-family:var(--sans);font-size:11px;font-weight:300;color:var(--muted);line-height:1.4;
}
.notable-text{
  font-family:var(--sans);font-size:13px;font-weight:300;
  color:var(--body);line-height:1.75;
}
.modal-footer{
  padding:20px 40px 26px;border-top:1px solid var(--border);
  display:flex;gap:10px;flex-shrink:0;
}
.btn-primary{
  flex:1;padding:14px 24px;background:transparent;color:var(--ink);
  border:1px solid rgba(26,26,26,0.22);border-radius:50px;
  font-family:var(--sans);font-size:10px;font-weight:500;
  letter-spacing:2.5px;text-transform:uppercase;text-align:center;
  display:block;transition:all 0.3s;
}
.btn-primary:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.btn-secondary{
  padding:12px 20px;border:1px solid var(--border);background:transparent;
  color:var(--muted);border-radius:50px;font-family:var(--sans);
  font-size:10px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;
}
.btn-secondary:hover{border-color:var(--ink);color:var(--ink)}

/* ── FOOTER ──────────────────────────────────────────────────── */
.site-footer{
  border-top:1px solid var(--border);padding:52px 40px;
  text-align:center;background:var(--bg);
}
.footer-brand{
  font-family:var(--serif);font-size:16px;font-weight:400;
  color:var(--ink);margin-bottom:10px;letter-spacing:0.3px;
}
.footer-brand em{font-style:italic}
.footer-addr{
  font-family:var(--sans);font-size:10px;font-weight:300;
  color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;line-height:2;
}

/* ── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

/* ── SPLASH TRANSITION ───────────────────────────────────────── */
function enterApp(){
  const splash=document.getElementById('splash');
  const app=document.getElementById('app');
  splash.style.opacity='0';
  setTimeout(()=>{
    splash.style.display='none';
    app.style.display='block';
    requestAnimationFrame(()=>requestAnimationFrame(()=>app.classList.add('visible')));
  },650);
}

/* ── DISCIPLINE LABEL ────────────────────────────────────────── */
function disciplineLabel(c){
  const map={
    'agency':'Creative Agency','production':'Film & Production',
    'documentary':'Documentary Film','architecture':'Architecture',
    'interior design':'Interior Design','design':'Design Studio',
    'art':'Fine Art','media':'Media & Publishing',
    'pr':'Public Relations','legal':'Legal Services',
    'health':'Health & Wellness','nonprofit':'Nonprofit',
    'startup':'Startup','tech':'Technology',
    'edtech':'Education Technology','education':'Education',
    'fitness':'Fitness & Wellness','audio':'Audio Post-Production',
    'film':'Film & Production','construction':'Construction',
    'talent':'Talent Management','e-commerce':'E-Commerce',
    'venture capital':'Venture Capital','bicycle':'Bicycle & Manufacturing',
    'beverage':'Beverage & Import','photography':'Photography',
    'sculpture':'Sculpture','painting':'Fine Art',
    'retail':'Retail','software':'Software',
    'experiential':'Experiential Marketing',
  };
  for(const tag of c.tags){
    const t=tag.toLowerCase();
    if(map[t])return map[t];
  }
  const t=c.tags[0]||'';
  return t?t.charAt(0).toUpperCase()+t.slice(1):'Member';
}

/* ── AVATAR ──────────────────────────────────────────────────── */
const AVATAR_BG='#2D4A3E';
function avatarDiv(company,size){
  const s=size||44;
  const r=s>=60?8:6;
  const initial=(company.name.match(/[A-Za-z]/)||['?'])[0].toUpperCase();
  return `<div style="width:${s}px;height:${s}px;border-radius:${r}px;background:${AVATAR_BG};display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:${Math.round(s*0.38)}px;color:#FAF7F2;flex-shrink:0">${initial}</div>`;
}

/* ── LOGO HTML ───────────────────────────────────────────────── */
function makeLogo(company,size){
  const s=size||44;
  if(!company.domain)return avatarDiv(company,s);
  const initial=(company.name.match(/[A-Za-z]/)||['?'])[0].toUpperCase();
  const r=s>=60?8:6;
  return `<img class="co-logo" src="https://logo.clearbit.com/${company.domain}" data-domain="${company.domain}" data-state="0" data-initial="${initial}" data-size="${s}" data-radius="${r}" style="width:${s}px;height:${s}px;object-fit:contain;display:block;padding:2px" loading="lazy" alt="${company.name} logo">`;
}

/* ── LOGO ERROR HANDLING ─────────────────────────────────────── */
document.addEventListener('error',function(e){
  const img=e.target;
  if(!img.classList||!img.classList.contains('co-logo'))return;
  const state=parseInt(img.dataset.state||'0');
  if(state===0){
    img.dataset.state='1';
    img.src=`https://www.google.com/s2/favicons?domain=${img.dataset.domain}&sz=128`;
    img.style.padding='6px';img.style.objectFit='cover';
  } else {
    const s=parseInt(img.dataset.size);
    const r=img.dataset.radius;
    const div=document.createElement('div');
    div.style.cssText=`width:${s}px;height:${s}px;border-radius:${r}px;background:${AVATAR_BG};display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:${Math.round(s*0.38)}px;color:#FAF7F2;flex-shrink:0`;
    div.textContent=img.dataset.initial;
    if(img.parentNode)img.parentNode.replaceChild(div,img);
  }
},true);

/* ── FLOOR LABEL ─────────────────────────────────────────────── */
function floorLabel(c){
  if(c.suite&&c.floor)return `Floor ${c.floor} &nbsp;&middot;&nbsp; Suite ${c.suite.split('(')[0].trim()}`;
  if(c.floor)return `Floor ${c.floor}`;
  if(c.suite)return `Suite ${c.suite.split('(')[0].trim()}`;
  return 'Location unlisted';
}

/* ── CARD ────────────────────────────────────────────────────── */
function renderCard(c,delay){
  return `<div class="card" data-id="${c.id}" style="animation-delay:${delay}s">
    <div class="card-name">${c.name}</div>
    <div class="card-discipline">${disciplineLabel(c)}</div>
    <div class="card-desc">${c.description}</div>
    <div class="card-view">View &rsaquo;</div>
  </div>`;
}

/* ── MODAL ───────────────────────────────────────────────────── */
let modalOpen=false;

function openModal(id){
  const c=companies.find(x=>x.id===id);
  if(!c)return;

  const headerHtml=`
    <button class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>
    <div class="modal-logo-row">
      <div class="modal-logo-wrap">${makeLogo(c,80)}</div>
      <div class="modal-name-block">
        <div class="modal-name">${c.name}</div>
        <div class="modal-discipline">${disciplineLabel(c)}</div>
        <div class="modal-residence">${floorLabel(c)}</div>
      </div>
    </div>`;
  document.getElementById('modalHeader').innerHTML=headerHtml;

  let body='';
  body+=`<div class="modal-section"><div class="section-label">About</div><div class="modal-desc">${c.description}</div></div>`;

  const contacts=[];
  if(c.website)contacts.push(`<div class="contact-row"><span class="contact-icon">&#9679;</span><div>Website &nbsp;<a href="${c.website}" target="_blank" rel="noopener">${c.website.replace(/https?:\/\//,'')}</a></div></div>`);
  if(c.phone)contacts.push(`<div class="contact-row"><span class="contact-icon">&#9679;</span><div>${c.phone}</div></div>`);
  if(c.email)contacts.push(`<div class="contact-row"><span class="contact-icon">&#9679;</span><div><a href="mailto:${c.email.split('|')[0].trim()}">${c.email}</a></div></div>`);
  if(c.linkedin)contacts.push(`<div class="contact-row"><span class="contact-icon">&#9679;</span><div>LinkedIn &nbsp;<a href="${c.linkedin}" target="_blank" rel="noopener">Profile</a></div></div>`);
  if(c.instagram)contacts.push(`<div class="contact-row"><span class="contact-icon">&#9679;</span><div>Instagram &nbsp;<a href="https://instagram.com/${c.instagram}" target="_blank" rel="noopener">@${c.instagram}</a></div></div>`);
  if(c.hours)contacts.push(`<div class="contact-row"><span class="contact-icon">&#9679;</span><div>${c.hours}</div></div>`);
  if(contacts.length)body+=`<div class="modal-section"><div class="section-label">Contact</div><div class="contact-grid">${contacts.join('')}</div></div>`;

  if(c.people&&c.people.length){
    const people=c.people.map(p=>`<div class="person-card"><div class="person-name">${p.name}</div><div class="person-title">${p.title}</div></div>`).join('');
    body+=`<div class="modal-section"><div class="section-label">Key People</div><div class="person-list">${people}</div></div>`;
  }
  if(c.notableClients)body+=`<div class="modal-section"><div class="section-label">Notable Clients</div><div class="notable-text">${c.notableClients}</div></div>`;
  if(c.notableWork)body+=`<div class="modal-section"><div class="section-label">Notable Work</div><div class="notable-text">${c.notableWork}</div></div>`;

  document.getElementById('modalBody').innerHTML=body;

  const footer=c.website
    ?`<a href="${c.website}" target="_blank" rel="noopener" class="btn-primary">Visit Website</a><button class="btn-secondary" onclick="closeModal()">Close</button>`
    :`<button class="btn-secondary" style="flex:1" onclick="closeModal()">Close</button>`;
  document.getElementById('modalFooter').innerHTML=footer;

  document.getElementById('modalScroll').scrollTop=0;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  modalOpen=true;
  document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
}

function closeModal(){
  if(!modalOpen)return;
  document.getElementById('modalOverlay').classList.remove('open');
  setTimeout(()=>{document.body.style.overflow=''},420);
  modalOpen=false;
}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('modalPanel').addEventListener('click',function(e){e.stopPropagation()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

/* ── FILTERS ─────────────────────────────────────────────────── */
const mainCategories=[
  {label:'All',tags:null},
  {label:'Agencies',tags:['agency','experiential']},
  {label:'Production',tags:['production','film','documentary','audio','podcast']},
  {label:'Architecture',tags:['architecture','interior design']},
  {label:'Design',tags:['design','branding','web','letterpress','stationery','product design','industrial design']},
  {label:'Art',tags:['art','painting','sculpture','gallery','photography']},
  {label:'Media',tags:['media','publishing','music','events','culture']},
];

let activeCategory=null;
let searchTerm='';

function buildNav(){
  const nav=document.getElementById('catNav');
  mainCategories.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='cat-link'+(i===0?' active':'');
    btn.textContent=cat.label;
    btn.dataset.idx=i;
    btn.addEventListener('click',function(){
      activeCategory=cat.tags;
      document.querySelectorAll('.cat-link').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      render();
    });
    nav.appendChild(btn);
  });
}

/* ── FILTER LOGIC ─────────────────────────────────────────────── */
function matchesSearch(c,term){
  if(!term)return true;
  const t=term.toLowerCase();
  const blob=[c.name,c.description,c.suite,c.notableClients,c.notableWork,...c.tags,...c.people.map(p=>p.name+' '+p.title)].join(' ').toLowerCase();
  return blob.includes(t);
}

function matchesCategory(c){
  if(!activeCategory)return true;
  return activeCategory.some(t=>c.tags.some(ct=>ct.toLowerCase().includes(t.toLowerCase())));
}

/* ── RENDER ──────────────────────────────────────────────────── */
function render(){
  const filtered=companies.filter(c=>matchesSearch(c,searchTerm)&&matchesCategory(c));
  const grid=document.getElementById('grid');
  const noResults=document.getElementById('noResults');
  const countBar=document.getElementById('countBar');

  if(!filtered.length){
    grid.innerHTML='';
    noResults.style.display='block';
    countBar.textContent='';
  } else {
    noResults.style.display='none';
    grid.innerHTML=filtered.map((c,i)=>renderCard(c,Math.min(i*0.035,0.35))).join('');
    countBar.textContent=filtered.length===companies.length?`${companies.length} Members`:`${filtered.length} of ${companies.length} Members`;
  }
}

/* ── GRID CLICK ──────────────────────────────────────────────── */
document.getElementById('grid').addEventListener('click',function(e){
  const card=e.target.closest('.card');
  if(card)openModal(parseInt(card.dataset.id));
});

/* ── SEARCH ──────────────────────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input',function(e){
  searchTerm=e.target.value.trim();
  render();
});

/* ── INIT ────────────────────────────────────────────────────── */
buildNav();
render();
</script>
</body>
</html>
